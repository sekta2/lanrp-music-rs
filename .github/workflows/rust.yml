name: Rust

on:
    push:
        branches: ["master"]
        tags: ["v*"]
    pull_request:
        branches: ["master"]

env:
    CARGO_TERM_COLOR: always
    BIN_NAME: "lanrp-music-rs"

jobs:
    build:
        name: Build on ${{ matrix.os }} (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # 1. Windows 64-bit
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      ext: .exe
                    # 2. Windows 32-bit
                    - os: windows-latest
                      target: i686-pc-windows-msvc
                      ext: .exe
                    # 3. Linux 64-bit
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      ext: ""
                    # 4. Linux 32-bit
                    - os: ubuntu-latest
                      target: i686-unknown-linux-gnu
                      ext: ""

        steps:
            - uses: actions/checkout@v4

            - name: Install Linux x64 dependencies
              if: matrix.target == 'x86_64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwayland-dev pkg-config

            - name: Install Linux x86 dependencies
              if: matrix.target == 'i686-unknown-linux-gnu'
              run: |
                  sudo dpkg --add-architecture i386
                  sudo apt-get update
                  sudo apt-get install -y gcc-multilib libwayland-dev:i386 pkg-config
                  echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
                  echo "PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig" >> $GITHUB_ENV

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build
              run: cargo build --verbose --release --target ${{ matrix.target }}

            - name: Run tests
              run: cargo test --verbose --target ${{ matrix.target }}

            - name: Prepare Artifact
              shell: bash
              run: |
                  cp target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.ext }} ./${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.ext }}

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BIN_NAME }}-${{ matrix.target }}
                  path: ./${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.ext }}

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: ./${{ env.BIN_NAME }}-${{ matrix.target }}${{ matrix.ext }}
                  generate_release_notes: true
